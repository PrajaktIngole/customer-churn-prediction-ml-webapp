<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Customer Churn Prediction</title>

    <!-- Bootstrap 5 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f4f6f9;
      }
      .card {
        border-radius: 15px;
      }
      .header {
        background: linear-gradient(90deg, #1d4ed8, #2563eb);
        color: white;
        padding: 20px;
        border-radius: 15px 15px 0 0;
      }
      .result-box {
        font-size: 1.2rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="card shadow-lg">
        <div class="header text-center">
          <h2>Customer Churn Prediction System</h2>
          <p>Machine Learning Powered Risk Analysis</p>
        </div>

        <div class="card-body p-4">
          <form action="/predict" method="post">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Tenure (Months)</label>
                <input
                  type="number"
                  class="form-control"
                  name="tenure"
                  required
                />
              </div>
              <div class="col-md-6">
                <label class="form-label">Monthly Charges</label>
                <input
                  type="number"
                  step="0.01"
                  class="form-control"
                  name="MonthlyCharges"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Contract Type</label>
                <select class="form-select" name="Contract">
                  <option>Month-to-month</option>
                  <option>One year</option>
                  <option>Two year</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Internet Service</label>
                <select class="form-select" name="InternetService">
                  <option>DSL</option>
                  <option>Fiber optic</option>
                  <option>No</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label">Senior Citizen</label>
                <select class="form-select" name="SeniorCitizen">
                  <option value="0">No</option>
                  <option value="1">Yes</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Partner</label>
                <select class="form-select" name="Partner">
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Dependents</label>
                <select class="form-select" name="Dependents">
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Paperless Billing</label>
                <select class="form-select" name="PaperlessBilling">
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Payment Method</label>
                <select class="form-select" name="PaymentMethod">
                  <option>Electronic check</option>
                  <option>Mailed check</option>
                  <option>Bank transfer (automatic)</option>
                  <option>Credit card (automatic)</option>
                </select>
              </div>
            </div>

            <div class="d-grid mt-4">
              <button class="btn btn-primary btn-lg">Predict Churn Risk</button>
            </div>
          </form>

          {% if prediction %}
          <div class="mt-4">
            <h5 class="text-center">Churn Probability</h5>

            <div class="progress" style="height: 30px">
              <div
                class="progress-bar bg-{{ color }} progress-bar-striped progress-bar-animated"
                role="progressbar"
                style="width: {{ prediction|safe }}%; "
                aria-valuenow="{{ prediction }}"
                aria-valuemin="0"
                aria-valuemax="100"
              >
                {{ prediction }}%
              </div>
            </div>

            <div class="text-center mt-3">
              <span class="badge bg-{{ color }} fs-6">
                Risk Level: {{ risk }}
              </span>
            </div>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
